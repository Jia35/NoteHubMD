<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHubMD</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">

    <!-- TailwindCSS (compiled) -->
    <link rel="stylesheet" href="/css/tailwind.min.css">

    <!-- Vue & Vue Router -->
    <script src="/vendors/js/vue.global.prod.js"></script>
    <script src="/vendors/js/vue-router.global.prod.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendors/js/morphdom.min.js"></script>

    <!-- CodeMirror 5 (CSS bundled) -->
    <link rel="stylesheet" href="/vendors/css/codemirror.bundle.css">
    <script src="/vendors/js/codemirror/codemirror.min.js"></script>
    <script src="/vendors/js/codemirror/mode/markdown.min.js"></script>
    <script src="/vendors/js/codemirror/mode/xml.min.js"></script>
    <script src="/vendors/js/codemirror/mode/javascript.min.js"></script>
    <script src="/vendors/js/codemirror/mode/css.min.js"></script>
    <script src="/vendors/js/codemirror/mode/htmlmixed.min.js"></script>
    <script src="/vendors/js/codemirror/mode/clike.min.js"></script>
    <script src="/vendors/js/codemirror/mode/python.min.js"></script>
    <script src="/vendors/js/codemirror/mode/shell.min.js"></script>
    <script src="/vendors/js/codemirror/mode/sql.min.js"></script>
    <script src="/vendors/js/codemirror/mode/go.min.js"></script>
    <script src="/vendors/js/codemirror/mode/yaml.min.js"></script>
    <script src="/vendors/js/codemirror/mode/powershell.min.js"></script>
    <script src="/vendors/js/codemirror/mode/vbscript.min.js"></script>
    <script src="/vendors/js/codemirror/addon/placeholder.min.js"></script>
    <script src="/vendors/js/codemirror/addon/show-hint.min.js"></script>

    <!-- Markdown-it -->
    <script src="/vendors/js/markdown-it/markdown-it.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-container.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-anchor.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-imsize.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-mark.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-sup.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-sub.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-ins.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-emoji.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-task-lists.min.js"></script>
    <link rel="stylesheet" href="/vendors/css/github-markdown.min.css">

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="/vendors/css/highlight/github.min.css" id="hljs-light-theme">
    <link rel="stylesheet" href="/vendors/css/highlight/github-dark.min.css" id="hljs-dark-theme" disabled>
    <script src="/vendors/js/highlight.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/vendors/css/fontawesome/all.min.css">

    <!-- Mermaid & Sortable -->
    <script src="/vendors/js/mermaid.min.js"></script>
    <script src="/vendors/js/sortable.min.js"></script>

    <!-- Day.js for date/time manipulation -->
    <script src="/vendors/js/dayjs/dayjs.min.js"></script>
    <script src="/vendors/js/dayjs/relativeTime.js"></script>
    <script src="/vendors/js/dayjs/zh-tw.js"></script>
    <script>
        dayjs.extend(dayjs_plugin_relativeTime);
        dayjs.locale('zh-tw');
    </script>

    <link rel="stylesheet" href="/css/style.css">

    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('NoteHubMD-theme') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body
    class="bg-gray-100 dark:bg-dark-bg h-screen overflow-hidden text-gray-900 dark:text-dark-text transition-colors duration-200">
    <div id="app" class="h-full flex flex-col">
        <router-view></router-view>

        <!-- Global Modal (replaces alert/confirm) -->
        <Teleport to="body">
            <Transition name="fade">
                <div v-if="$root.modal.show" class="fixed inset-0 flex items-center justify-center bg-black/60"
                    style="z-index: 200;" @click.self="$root.modal.type === 'alert' ? $root.closeModal() : null">
                    <Transition name="modal-scale">
                        <div v-if="$root.modal.show"
                            class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
                            <!-- Header -->
                            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center"
                                :class="{
                                    'bg-blue-50 dark:bg-blue-900/20': $root.modal.type === 'info',
                                    'bg-green-50 dark:bg-green-900/20': $root.modal.type === 'success',
                                    'bg-yellow-50 dark:bg-yellow-900/20': $root.modal.type === 'warning',
                                    'bg-red-50 dark:bg-red-900/20': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                }">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3" :class="{
                                        'bg-blue-100 text-blue-600 dark:bg-blue-800 dark:text-blue-300': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'bg-green-100 text-green-600 dark:bg-green-800 dark:text-green-300': $root.modal.type === 'success',
                                        'bg-yellow-100 text-yellow-600 dark:bg-yellow-800 dark:text-yellow-300': $root.modal.type === 'warning',
                                        'bg-red-100 text-red-600 dark:bg-red-800 dark:text-red-300': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                    }">
                                    <i class="fa-solid text-lg" :class="{
                                        'fa-circle-info': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'fa-circle-check': $root.modal.type === 'success',
                                        'fa-triangle-exclamation': $root.modal.type === 'warning',
                                        'fa-circle-xmark': $root.modal.type === 'error',
                                        'fa-question-circle': $root.modal.type === 'confirm'
                                    }"></i>
                                </div>
                                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                                    {{ $root.modal.title || ($root.modal.type === 'confirm' ? '確認' : '提示') }}
                                </h3>
                            </div>
                            <!-- Body -->
                            <div class="px-6 py-4">
                                <p class="text-gray-700 dark:text-gray-300 whitespace-pre-wrap">{{ $root.modal.message
                                    }}</p>
                            </div>
                            <!-- Footer -->
                            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900 flex justify-end space-x-3">
                                <button v-if="$root.modal.type === 'confirm'" @click="$root.closeModal(false)"
                                    class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                                    {{ $root.modal.cancelText || '取消' }}
                                </button>
                                <button @click="$root.closeModal(true)"
                                    class="px-4 py-2 text-white rounded-lg transition" :class="{
                                        'bg-blue-600 hover:bg-blue-700': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'bg-green-600 hover:bg-green-700': $root.modal.type === 'success',
                                        'bg-yellow-600 hover:bg-yellow-700': $root.modal.type === 'warning',
                                        'bg-red-600 hover:bg-red-700': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                    }">
                                    {{ $root.modal.confirmText || '確定' }}
                                </button>
                            </div>
                        </div>
                    </Transition>
                </div>
            </Transition>
        </Teleport>
    </div>

    <!-- Templates -->

    <!-- Book Card Component Template -->
    <script type="text/x-template" id="book-card-template">
        <div class="w-80 shrink-0 group relative bg-white dark:bg-dark-surface p-6 rounded-lg shadow hover:shadow-xl cursor-pointer transition border border-gray-200 dark:border-gray-700" @click="$emit('click')">
            <!-- Dropdown Menu Button -->
            <div class="absolute top-2 right-2" ref="menuButton">
                <button @click.stop="$emit('toggle-menu')" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
            </div>
            <!-- Dropdown Menu - Teleported to body -->
            <Teleport to="body">
                <div v-if="showMenu" class="fixed w-36 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-[100]" :style="menuStyle">
                    <button @click.stop="$emit('open-info')" class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">
                        <i class="fa-solid fa-circle-info mr-2"></i>資訊
                    </button>
                    <button @click.stop="$emit('toggle-pin')" class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="fa-solid fa-thumbtack mr-2"></i>{{ isPinned ? '取消釘選' : '釘選到側邊欄' }}
                    </button>
                    <button @click.stop="book.canDelete && $emit('delete')" 
                            :class="book.canDelete ? 'text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700' : 'text-gray-400 cursor-not-allowed'"
                            class="w-full px-4 py-2 text-left text-sm rounded-b-lg"
                            :disabled="!book.canDelete">
                        <i class="fa-solid fa-trash mr-2"></i>刪除
                    </button>
                </div>
            </Teleport>
            <div class="flex items-center mb-1">
                <span class="w-6 mr-2 text-center shrink-0 text-lg"><i class="fa-solid fa-book text-green-500"></i></span>
                <h3 class="font-bold text-lg text-gray-800 dark:text-white truncate">{{ book.title }} ({{ book.noteCount ?? 0 }})</h3>
            </div>
            <div class="mb-2">
                <p class="text-gray-500 dark:text-gray-400 text-sm" title="最後編輯時間">{{ dayjs(book.updatedAt).format('YYYY/MM/DD HH:mm') }}</p>
                <p v-if="book.lastUpdater || book.owner" class="text-gray-400 dark:text-gray-500 text-xs">by {{ book.lastUpdater?.username || book.owner?.username }}</p>
                <p class="text-gray-500 dark:text-gray-400 text-sm truncate">{{ book.description || '' }}</p>
            </div>
            <!-- Tags -->
            <div v-if="book.tags && book.tags.length > 0" class="flex flex-wrap gap-1">
                <span v-for="tag in book.tags" :key="tag" class="px-2 py-0.5 text-xs rounded-full bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300">
                    {{ tag }}
                </span>
            </div>
        </div>
    </script>

    <!-- Note Card Component Template -->
    <script type="text/x-template" id="note-card-template">
        <!-- Grid Mode -->
    <div v-if="mode === 'grid'"
        class="group relative bg-white dark:bg-dark-surface p-6 rounded-lg shadow hover:bg-gray-100 dark:hover:bg-gray-800 hover:shadow-xl cursor-pointer transition border border-gray-200 dark:border-gray-700"
        @click="$emit('click')">
        <!-- Dropdown Menu Button -->
        <div class="absolute top-2 right-2">
            <button @click.stop="$emit('toggle-menu')"
                class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <!-- Dropdown Menu -->
            <div v-if="showMenu"
                class="absolute right-0 mt-1 w-36 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-10">
                <button @click.stop="$emit('open-info')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">
                    <i class="fa-solid fa-circle-info mr-2"></i>資訊
                </button>
                <button v-if="showMoveOption" @click.stop="$emit('open-move')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-folder-open mr-2"></i>移動至...
                </button>
                <button @click.stop="$emit('toggle-pin')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-thumbtack mr-2"></i>{{ isPinned ? '取消釘選' : '釘選到側邊欄' }}
                </button>
                <button @click.stop="note.canDelete && $emit('delete')"
                    :class="note.canDelete ? 'text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700' : 'text-gray-400 cursor-not-allowed'"
                    class="w-full px-4 py-2 text-left text-sm rounded-b-lg" :disabled="!note.canDelete">
                    <i class="fa-solid fa-trash mr-2"></i>刪除
                </button>
            </div>
        </div>
        <div class="flex items-center mb-1">
            <span class="w-6 mr-2 text-center shrink-0 text-lg"><i
                    class="fa-solid fa-note-sticky text-blue-500"></i></span>
            <h3 class="font-bold text-lg text-gray-800 dark:text-white truncate">{{ note.title || 'Untitled' }}</h3>
        </div>
        <div class="mb-2">
            <p class="text-gray-500 dark:text-gray-400 text-sm" title="最後編輯時間">{{ dayjs(note.lastEditedAt ||
                note.updatedAt).format('YYYY/MM/DD HH:mm') }}</p>
            <p v-if="note.lastEditor || note.owner" class="text-gray-400 dark:text-gray-500 text-xs">by {{
                note.lastEditor?.username || note.owner?.username }}</p>
        </div>
        <!-- Tags -->
        <div v-if="note.tags && note.tags.length > 0" class="flex flex-wrap gap-1">
            <span v-for="tag in note.tags" :key="tag"
                class="px-2 py-0.5 text-xs rounded-full bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300">
                {{ tag }}
            </span>
        </div>
    </div>

    <!-- List Mode -->
    <div v-else
        class="flex items-center p-3 bg-white dark:bg-dark-surface rounded shadow hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer border border-gray-100 dark:border-gray-700 transition group relative"
        @click="$emit('click')">
        <!-- Icon -->
        <div class="w-10 text-center text-xl mr-3 text-blue-500 flex-shrink-0"><i class="fa-solid fa-note-sticky"></i>
        </div>

        <!-- Main Info -->
        <div class="flex-1 min-w-0 mr-4">
            <div class="flex items-center gap-2 mb-1">
                <h3 class="font-bold text-gray-800 dark:text-white truncate text-base">{{ note.title || 'Untitled' }}
                </h3>
                <div v-if="note.tags && note.tags.length > 0" class="flex flex-wrap gap-1">
                    <span v-for="tag in note.tags" :key="tag"
                        class="px-2 py-0.5 text-xs rounded-full bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 flex-shrink-0">
                        {{ tag }}
                    </span>
                </div>
            </div>
            <div class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-4">
                <span>{{ dayjs(note.lastEditedAt || note.updatedAt).format('YYYY/MM/DD HH:mm') }}</span>
                <span v-if="note.lastEditor || note.owner">by {{ note.lastEditor?.username ||
                    note.owner?.username}}</span>
            </div>
        </div>

        <!-- Context Menu Button -->
        <div class="relative shrink-0">
            <button @click.stop="$emit('toggle-menu')"
                class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <!-- Dropdown Menu -->
            <div v-if="showMenu"
                class="absolute right-0 top-full mt-1 w-36 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50">
                <button @click.stop="$emit('open-info')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">
                    <i class="fa-solid fa-circle-info mr-2"></i>資訊
                </button>
                <button @click.stop="$emit('toggle-pin')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-thumbtack mr-2"></i>{{ isPinned ? '取消釘選' : '釘選到側邊欄' }}
                </button>
                <button v-if="showMoveOption" @click.stop="$emit('open-move')"
                    class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-folder-open mr-2"></i>移動至...
                </button>
                <button @click.stop="note.canDelete && $emit('delete')"
                    :class="note.canDelete ? 'text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700' : 'text-gray-400 cursor-not-allowed'"
                    class="w-full px-4 py-2 text-left text-sm rounded-b-lg" :disabled="!note.canDelete">
                    <i class="fa-solid fa-trash mr-2"></i>刪除
                </button>
            </div>
        </div>
    </div>
    </script>


    <script type="text/x-template" id="info-modal-template">
        <div v-if="show" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="$emit('close')">
            <div class="bg-white dark:bg-dark-surface rounded-lg shadow-xl w-full max-w-2xl mx-4 overflow-hidden flex flex-col" style="height: 70vh;">
                <!-- Modal Header -->
                <div class="flex justify-between items-center p-4 border-b border-gray-300 dark:border-gray-700 shrink-0">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white">
                        <i :class="type === 'book' ? 'fa-solid fa-book' : 'fa-solid fa-note-sticky'" class="mr-2"></i>
                        {{ type === 'book' ? '書本設定' : '筆記設定' }}
                    </h2>
                    <button @click="$emit('close')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <!-- Modal Body with Tabs -->
                <div class="flex flex-1 overflow-hidden">
                    <!-- Left Sidebar Tabs -->
                    <div class="w-40 border-r border-gray-300 dark:border-gray-700 shrink-0">
                        <button @click="$emit('update:tab', 'info')" 
                                :class="tab === 'info' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-info-circle mr-2"></i>{{ type === 'book' ? '書本資訊' : '筆記資訊' }}
                        </button>
                        <button @click="$emit('update:tab', 'permission')" 
                                :class="tab === 'permission' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-lock mr-2"></i>權限設定
                        </button>
                        <button v-if="type === 'note'" @click="$emit('update:tab', 'share')" 
                                :class="tab === 'share' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-share-nodes mr-2"></i>分享筆記
                        </button>
                    </div>

                    <!-- Right Content Area -->
                    <div class="flex-1 overflow-y-auto">
                        <!-- Info Tab Content -->
                        <div v-show="tab === 'info'" class="p-4 space-y-4">
                            <!-- Title Section (at top) -->
                            <div>
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">
                                    <i :class="type === 'book' ? 'fa-solid fa-book' : 'fa-solid fa-note-sticky'" class="mr-1"></i> 標題
                                </label>
                                <!-- Editable title for books -->
                                <input v-if="type === 'book' && item.canEdit"
                                       :value="item.title || ''"
                                       @input="$emit('update:title', $event.target.value)"
                                       type="text"
                                       placeholder="輸入標題..."
                                       class="w-full px-3 py-2 text-sm font-bold border rounded bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <!-- Read-only title for notes or non-editable books -->
                                <div v-else class="px-3 py-2 text-sm font-bold text-gray-800 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded">
                                    {{ item.title || 'Untitled' }}
                                </div>
                            </div>

                            <!-- Item Info -->
                            <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded text-sm">
                                <div class="text-gray-500 dark:text-gray-400 mb-1">ID：<span class="font-mono text-gray-700 dark:text-gray-300">{{ item.id }}</span></div>
                                <div class="text-gray-500 dark:text-gray-400 mb-1">{{ type === 'book' ? '建立者' : '擁有者' }}：<span class="text-gray-700 dark:text-gray-300">{{ item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">建立時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.createdAt) }}</span></div>
                                <!-- Book: 最後更新者, 最後更新時間 -->
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新者：<span class="text-gray-700 dark:text-gray-300">{{ item.lastUpdater?.username || item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.updatedAt) }}</span></div>
                                <!-- Note: 最後編輯者, 最後編輯時間, 最後更新者, 最後更新時間 -->
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">最後編輯者：<span class="text-gray-700 dark:text-gray-300">{{ item.lastEditor?.username || item.owner?.username || '(未知)' }}</span></div>

                                    <option value="today">今天</option>
                                    <option value="week">一週內</option>
                                    <option value="month">一個月內</option>
                                    <option value="year">一年內</option>

                    <!-- Search Results -->

                                </div>

                                                {{ dayjs(note.lastEditedAt || note.updatedAt).format('YYYY/MM/DD HH:mm') }}
                                            </span>
                                        </div>
                                    </a>
                                </div>
                            </div>

                            </div>
                        </div>

                        <!-- Notes -->
                        <div v-if="searchResults.notes.length > 0">
                            <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase mb-3">筆記 ({{

                                    <div class="flex items-center justify-between">

                                                <span v-if="note.book">{{note.book.title}}</span>
                                                <span v-else><i>未分類</i></span>
                                            </p>
                                        </div>
                                        <span
                                            class="text-xs text-gray-400 dark:text-gray-500 ml-3 shrink-0 whitespace-nowrap"
                                            title="上次編輯">
                                            {{ dayjs(note.lastEditedAt || note.updatedAt).format('YYYY/MM/DD HH:mm') }}
                                        </span>
                                    </div>
                                </router-link>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

                    <select v-model="sortBy" 
                            class="px-3 py-1.5 text-sm border rounded-lg bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option v-for="opt in sortOptions" :key="opt.value" :value="opt.value">{{ opt.label }}</option>
                    </select>
                    <button @click="sortOrder = sortOrder === 'desc' ? 'asc' : 'desc'" 
                            class="px-3 py-1.5 text-sm border rounded-lg bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                            :title="sortOrder === 'desc' ? '降冪' : '升冪'">
                        <i :class="sortOrder === 'desc' ? 'fa-solid fa-arrow-down-wide-short' : 'fa-solid fa-arrow-up-wide-short'"></i>
                    </button>

                    <div v-if="filteredBooks.length == 0" @click="openCreateBookModal" class="w-64 shrink-0 flex flex-col items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition cursor-pointer border-2 border-dashed border-gray-300 dark:border-gray-600 p-6">
                        <i class="fa-solid fa-plus text-3xl text-green-500 mb-3"></i>
                        <p class="text-gray-600 dark:text-gray-300 font-medium">新增書本</p>
                    </div>
                    <BookCard 
                        v-for="book in filteredBooks" 
                        :key="book.id" 
                        :book="book"
                        :show-menu="openMenuId === 'book-' + book.id"
                        :is-pinned="isPinned('book', book.id)"
                        @toggle-menu="toggleMenu('book', book.id)"
                        @open-info="openInfoModal('book', book)"
                        @toggle-pin="togglePin('book', book.id)"
                        @delete="deleteBook(book.id, $event)"
                        @click="openBook(book)"
                    />
                    <!-- More Books Button -->
                    <div v-if="hasMoreBooks" class="w-40 shrink-0 flex items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition cursor-pointer border border-gray-200 dark:border-gray-700" @click="$router.push('/books')">
                        <div class="text-center text-gray-500 dark:text-gray-400">
                            <i class="fa-solid fa-arrow-right text-2xl mb-2"></i>
                            <p>更多書本</p>
                        </div>
                    </div>
                </div>
            </div>

                <div class="flex items-center justify-between mb-4">

                                :class="notesPerPage === opt ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600'"

                            <i class="fa-solid fa-border-all pointer-events-none"></i>
                        </button>
                        <button type="button" @click="setNotesDisplayMode('list')" :class="{'bg-white dark:bg-gray-600 text-blue-500 shadow-sm': notesDisplayMode === 'list', 'text-gray-400 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300': notesDisplayMode !== 'list'}" class="px-2 py-1 rounded transition" title="清單顯示">

                        </button>
                    </div>
                </div>
                
                <div v-if="notesDisplayMode === 'grid'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 2xl:grid-cols-4 gap-4">
                    <div v-if="filteredNotes.length == 0" @click="createNote" class="flex flex-col items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition cursor-pointer border-2 border-dashed border-gray-300 dark:border-gray-600 p-6 min-h-[120px]">
                        <i class="fa-solid fa-plus text-3xl text-blue-500 mb-3"></i>

                        v-for="note in paginatedNotes" 
                        :key="note.id"
                        :note="note"

                        :show-menu="openMenuId === 'note-' + note.id"
                        :is-pinned="isPinned('note', note.id)"
                        :show-move-option="true"
                        @toggle-menu="toggleMenu('note', note.id)"
                        @open-info="openInfoModal('note', note)"
                        @toggle-pin="togglePin('note', note.id)"
                        @open-move="openMoveNoteModal(note)"
                        @delete="deleteNote(note.id, $event)"
                        @click="openNote(note)"
                    />
                </div>
                
                <div v-else class="flex flex-col gap-2">

                            <i class="fa-solid fa-chevron-left"></i>

                                {{ page }}
                            </button>
                        </template>
                        
                        <!-- Next Button -->
                        <button @click="goToNotesPage(currentNotesPage + 1)" :disabled="currentNotesPage === totalNotesPages"

                                    <span v-else class="text-sm px-2 py-1 rounded" 
                                          :class="{
                                              'bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300': user.role === 'super-admin',
                                              'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300': user.role === 'admin',
                                              'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300': user.role === 'user'
                                          }">
                                        {{ user.role }}
                                    </span>
                                </td>
                                <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">
                                    {{ formatDateTime(user.createdAt) }}
                                </td>
                                <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">
                                    {{ user.lastActiveAt ? formatRelativeTime(user.lastActiveAt) : '從未' }}
                                </td>
                                <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">
                                    <span class="mr-2"><i class="fa-solid fa-book mr-1"></i>{{ user.bookCount }}</span>
                                    <span><i class="fa-solid fa-note-sticky mr-1"></i>{{ user.noteCount }}</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </script>

    <script type="text/x-template" id="book-template">
        <div class="px-8 py-5 container mx-auto overflow-y-auto h-full">
            <div class="mb-6 flex items-center text-gray-500 dark:text-gray-400">
                <router-link to="/" class="hover:text-blue-500">Home</router-link>
                <span class="mx-2">/</span>
                <span>{{ book.title }}</span>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-bold text-gray-800 dark:text-white flex items-center">
                    <span class="mr-3"><i class="fa-solid fa-book"></i></span> {{ book.title }}
                </h1>
                <div class="flex items-center gap-3">
                    <button v-if="canAddNote" @click="createNote" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition">
                        <i class="fa-solid fa-plus mr-1"></i><i class="fa-solid fa-note-sticky mr-1"></i> 新增筆記
                    </button>
                    <!-- Permission Button (Owner only) / Display (Non-owner) -->
                    <button v-if="isOwner" @click="infoModalTab = 'permission'; showInfoModal = true; initInfoModal()" 
                            class="flex items-center space-x-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-2 py-1 rounded text-sm text-gray-700 dark:text-gray-300 transition"
                            title="點擊設定權限">
                        <i class="fa-solid fa-lock text-xs"></i>
                        <span>{{ permissionOptions.find(o => o.value === permission)?.label || permission }}</span>
                    </button>
                    <span v-else class="flex items-center space-x-1 bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-sm text-gray-600 dark:text-gray-400">
                        <i class="fa-solid fa-lock text-xs"></i>
                        <span>{{ permissionOptions.find(o => o.value === permission)?.label || permission }}</span>
                    </span>
                    <!-- Book Info Button -->
                    <button @click="infoModalTab = 'info'; showInfoModal = true; initInfoModal()" 
                            class="flex items-center space-x-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-2 py-1 rounded text-sm text-gray-700 dark:text-gray-300 transition"
                            title="書本設定">
                        <i class="fa-solid fa-cog text-xs"></i>
                        <span>書本設定</span>
                    </button>
                </div>
            </div>

            <!-- Read-only Info Display -->
            <div class="mb-4 bg-white dark:bg-dark-surface p-4 rounded-lg shadow border border-gray-200 dark:border-gray-700">
                <!-- Tags (read-only) -->
                <div class="flex items-center mb-3">
                    <i class="fa-solid fa-tags text-gray-400 mr-2"></i>
                    <span class="text-sm font-medium text-gray-600 dark:text-gray-400 mr-3">標籤</span>
                    <div class="flex flex-wrap gap-2">
                        <span v-for="tag in book.tags" :key="tag" class="px-3 py-1 text-sm rounded-full bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300">
                            {{ tag }}
                        </span>
                        <span v-if="!book.tags || book.tags.length === 0" class="text-gray-400 text-sm italic">無標籤</span>
                    </div>
                </div>
                <!-- Description (read-only) -->
                <div class="flex items-start">
                    <i class="fa-solid fa-align-left text-gray-400 mr-2 mt-1"></i>
                    <span class="text-sm font-medium text-gray-600 dark:text-gray-400 mr-3">描述</span>
                    <p class="text-gray-700 dark:text-gray-300 text-sm flex-1">{{ book.description || '無描述' }}</p>
                </div>
            </div>

            <!-- Notes List -->
            <div ref="notesList" class="bg-white dark:bg-dark-surface rounded-lg shadow overflow-hidden border border-gray-200 dark:border-gray-700">
                <div v-for="note in book.Notes" :key="note.id" :data-id="note.id" class="note-item p-4 border-b dark:border-gray-700 last:border-b-0 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer flex items-center" @click="openNote(note)">
                    <!-- Drag handle (only show if canEdit) -->
                    <span v-if="canEdit" class="drag-handle cursor-move text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 mr-3 px-1" @click.stop>
                        <i class="fa-solid fa-grip-vertical"></i>
                    </span>
                    <div class="flex items-center flex-1 min-w-0">
                        <span class="mr-3 text-gray-400"><i class="fa-solid fa-note-sticky"></i></span>
                        <span class="font-medium text-lg text-gray-800 dark:text-gray-200 truncate">{{ note.title }}</span>
                    </div>
                    <span class="text-sm text-gray-500 dark:text-gray-400 shrink-0 ml-2" title="最後編輯時間">{{ new Date(note.updatedAt).toLocaleString() }}</span>
                </div>
                <div v-if="!book.Notes || book.Notes.length === 0" class="p-8 text-center text-gray-500 dark:text-gray-400">
                    這本書裡還沒有筆記。
                </div>
            </div>


            <!-- Book Info Modal (shared component) -->
            <InfoModal :show="showInfoModal" type="book" :item="bookInfoItem" :tab="infoModalTab"
                :editable-description="editableDescription" :editable-tags="editableTags" :new-tag-input="newTag"
                :editable-permission="editablePermission" :user-permissions="infoUserPermissions"
                :loading-user-permissions="infoLoadingUserPermissions" :user-search-query="infoUserSearchQuery"
                :user-search-results="infoUserSearchResults" :new-user-permission="infoNewUserPermission"
                @close="showInfoModal = false" @save="saveBookChanges" @update:tab="infoModalTab = $event"
                @update:title="bookInfoItem.title = $event" @update:description="editableDescription = $event" @update:permission="editablePermission = $event"
                @update:isPublic="book.isPublic = $event"
                @update:newTag="newTag = $event" @update:newUserPermission="infoNewUserPermission = $event"
                @add-tag="addEditableTag" @remove-tag="removeEditableTag"
                @search-users="(q) => { infoUserSearchQuery = q; infoSearchUsers(); }"
                @add-user-permission="addInfoUserPermission" @remove-user-permission="removeInfoUserPermission"
                @update-user-permission="updateInfoUserPermissionLevel" />
        </div>
    </script>

    <script src="/js/common.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/home.js"></script>
</body>

</html>
