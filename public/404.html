<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - NoteHubMD</title>

    <!-- TailwindCSS (compiled) -->
    <link rel="stylesheet" href="/css/tailwind.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/vendors/css/fontawesome/all.min.css">

    <link rel="stylesheet" href="/css/style.css">

    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('NoteHubMD-theme') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body
    class="bg-gray-100 dark:bg-dark-bg h-screen overflow-hidden text-gray-900 dark:text-dark-text transition-colors duration-200">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center max-w-lg mx-auto p-8">
            <!-- 404 Icon -->
            <div class="mb-8">
                <i class="fa-solid fa-file-circle-question text-8xl text-gray-400 dark:text-gray-600"></i>
            </div>

            <!-- Title -->
            <h1 class="text-6xl font-bold text-gray-800 dark:text-white mb-4">404</h1>
            <h2 class="text-2xl font-semibold text-gray-600 dark:text-gray-400 mb-6">頁面不存在</h2>

            <!-- Message -->
            <p class="text-gray-500 dark:text-gray-500 mb-8">
                您要找的頁面可能已被刪除、移動，或從未存在。
            </p>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/"
                    class="inline-flex items-center justify-center px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                    <i class="fa-solid fa-home mr-2"></i>
                    返回首頁
                </a>
                <button onclick="history.back()"
                    class="inline-flex items-center justify-center px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition font-medium cursor-pointer">
                    <i class="fa-solid fa-arrow-left mr-2"></i>
                    返回上一頁
                </button>
            </div>
        </div>
    </div>
</body>

</html>
