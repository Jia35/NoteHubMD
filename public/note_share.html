<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHubMD - Share</title>

    <!-- TailwindCSS (compiled) -->
    <link rel="stylesheet" href="/css/tailwind.min.css">

    <!-- Vue & Vue Router -->
    <script src="/vendors/js/vue.global.prod.js"></script>
    <script src="/vendors/js/vue-router.global.prod.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Markdown-it -->
    <script src="/vendors/js/markdown-it/markdown-it.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-container.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-anchor.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-imsize.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-mark.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-sup.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-emoji.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-task-lists.min.js"></script>
    <link rel="stylesheet" href="/vendors/css/github-markdown.min.css">

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="/vendors/css/highlight/github.min.css" id="hljs-light-theme">
    <link rel="stylesheet" href="/vendors/css/highlight/github-dark.min.css" id="hljs-dark-theme" disabled>
    <script src="/vendors/js/highlight.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/vendors/css/fontawesome/all.min.css">

    <!-- Mermaid -->
    <script src="/vendors/js/mermaid.min.js"></script>

    <!-- Reveal.js -->
    <link rel="stylesheet" href="/vendors/css/reveal/reveal.css">
    <link rel="stylesheet" href="/vendors/css/reveal/theme/black.css" id="reveal-theme">
    <script src="/vendors/js/reveal/reveal.js"></script>

    <link rel="stylesheet" href="/css/style.css">

    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('NoteHubMD-theme') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body
    class="bg-gray-100 dark:bg-dark-bg h-screen overflow-hidden text-gray-900 dark:text-dark-text transition-colors duration-200">
    <div id="app" class="h-full flex flex-col">
        <router-view></router-view>
    </div>

    <!-- Share Page Template -->
    <script type="text/x-template" id="share-template">
        <div class="flex flex-col h-full bg-white dark:bg-dark-bg text-gray-900 dark:text-dark-text">
            <!-- Loading State -->
            <div v-if="loading" class="flex items-center justify-center h-full">
                <div class="text-center">
                    <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                    <p class="text-gray-500 dark:text-gray-400">載入中...</p>
                </div>
            </div>

            <!-- Error State -->
            <div v-else-if="error" class="flex items-center justify-center h-full">
                <div class="text-center max-w-md mx-auto p-8">
                    <i class="fa-solid fa-exclamation-circle text-6xl text-red-500 mb-4"></i>
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-2">無法載入</h2>
                    <p class="text-gray-600 dark:text-gray-400 mb-4">{{ error }}</p>
                    <a href="/" class="inline-block px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                        <i class="fa-solid fa-home mr-2"></i>返回首頁
                    </a>
                </div>
            </div>

            <!-- Content -->
            <template v-else>
                <!-- Header -->
                <div v-show="!showPresentation" class="bg-gray-200 dark:bg-gray-900 dark:text-white px-4 py-3 flex items-center shadow-md z-10 shrink-0">
                    <div class="flex-1 flex items-center space-x-3">
                        <a href="/" class="hover:text-blue-400 transition font-medium">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                        </a>
                        <span class="text-gray-600">/</span>
                        <span class="text-sm bg-gray-300 dark:bg-gray-800 px-3 py-1 rounded truncate max-w-md">
                            <i class="fa-solid fa-note-sticky mr-2 text-blue-500"></i>{{ title || 'Untitled' }}
                        </span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <!-- Theme Toggle Button -->
                        <button @click="toggleTheme" 
                                class="px-2 py-1 text-xs border border-gray-500 text-gray-600 dark:text-gray-400 rounded hover:bg-gray-400 hover:text-white dark:hover:bg-gray-700 dark:hover:text-white transition"
                                :title="theme === 'dark' ? '切換為淺色模式' : '切換為深色模式'">
                            <i :class="theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"></i>
                        </button>
                        <!-- Presentation Mode Button -->
                        <button @click="togglePresentation" 
                                class="px-2 py-1 text-xs border border-gray-500 text-gray-600 dark:text-gray-400 rounded hover:bg-gray-400 hover:text-white dark:hover:bg-gray-700 dark:hover:text-white transition"
                                title="簡報模式">
                            <i class="fa-solid fa-display mr-1"></i>簡報
                        </button>
                        <!-- Edit Button (Outline Style, Smaller) -->
                        <a v-if="canEdit" :href="'/n/' + noteId" 
                           class="px-2 py-1 text-xs border border-blue-500 text-blue-400 rounded hover:bg-blue-500 hover:text-white transition">
                            <i class="fa-solid fa-pen-to-square mr-1"></i>編輯
                        </a>
                    </div>
                </div>

                <!-- Main Content with TOC -->
                <div v-show="!showPresentation" class="flex-1 flex overflow-hidden">
                    <!-- Preview Content -->
                    <div class="flex-1 overflow-auto" ref="previewContainer" @scroll="handlePreviewScroll">
                        <!-- Preview Info Bar -->
                        <div class="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 py-2 text-xs text-gray-500 dark:text-gray-400 flex justify-center">
                            <div class="w-full px-8" style="max-width: 800px">
                                <div class="flex items-center space-x-4">
                                    <!-- Owner -->
                                    <div v-if="noteOwner" class="flex items-center">
                                        <div class="relative group mr-1.5">
                                            <span class="w-5 h-5 rounded-full flex items-center justify-center font-medium text-white shrink-0 overflow-hidden cursor-help"
                                                  style="font-size: 10px;"
                                                  :class="noteOwner.username && noteOwner.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                <img v-if="noteOwner.avatar" :src="noteOwner.avatar" class="w-full h-full object-cover" alt="">
                                                <template v-else>{{ noteOwner.username?.charAt(0).toUpperCase() || '?' }}</template>
                                            </span>
                                            <!-- Tooltip -->
                                            <div class="absolute top-full left-0 mt-2 hidden group-hover:block z-50 bg-white dark:bg-gray-800 rounded-lg shadow-xl p-4 border border-gray-200 dark:border-gray-600" style="min-width: 200px;">
                                                <div class="absolute -top-2 left-2 w-4 h-4 bg-white dark:bg-gray-800 border-t border-l border-gray-200 dark:border-gray-600 transform rotate-45"></div>
                                                <div class="flex items-center relative z-10">
                                                    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-3 overflow-hidden shrink-0 border-2 border-gray-100 dark:border-gray-600"
                                                         :class="noteOwner.username && noteOwner.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                         <img v-if="noteOwner.avatar" :src="noteOwner.avatar" class="w-full h-full object-cover">
                                                         <span v-else class="text-xl text-white font-bold">{{ noteOwner.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                    </div>
                                                    <div>
                                                        <div class="font-bold text-gray-900 dark:text-white text-base">{{ noteOwner.name || noteOwner.username || 'Guest' }}</div>
                                                        <div class="text-xs text-gray-500 dark:text-gray-400">@{{ noteOwner.username || 'guest' }}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <span>{{ noteOwner.name || noteOwner.username || '?' }} 擁有這篇筆記</span>
                                    </div>
                                    <!-- Last Editor -->
                                    <div v-if="lastEditor" class="flex items-center">
                                        <div class="relative group mr-1.5">
                                            <span class="w-5 h-5 rounded-full flex items-center justify-center font-medium text-white shrink-0 overflow-hidden cursor-help"
                                                  style="font-size: 10px;"
                                                  :class="lastEditor.username && lastEditor.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                <img v-if="lastEditor.avatar" :src="lastEditor.avatar" class="w-full h-full object-cover" alt="">
                                                <template v-else>{{ lastEditor.username?.charAt(0).toUpperCase() || '?' }}</template>
                                            </span>
                                            <!-- Tooltip -->
                                            <div class="absolute top-full left-0 mt-2 hidden group-hover:block z-50 bg-white dark:bg-gray-800 rounded-lg shadow-xl p-4 border border-gray-200 dark:border-gray-600" style="min-width: 200px;">
                                                <div class="absolute -top-2 left-2 w-4 h-4 bg-white dark:bg-gray-800 border-t border-l border-gray-200 dark:border-gray-600 transform rotate-45"></div>
                                                <div class="flex items-center relative z-10">
                                                    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-3 overflow-hidden shrink-0 border-2 border-gray-100 dark:border-gray-600"
                                                         :class="lastEditor.username && lastEditor.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                         <img v-if="lastEditor.avatar" :src="lastEditor.avatar" class="w-full h-full object-cover">
                                                         <span v-else class="text-xl text-white font-bold">{{ lastEditor.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                    </div>
                                                    <div>
                                                        <div class="font-bold text-gray-900 dark:text-white text-base">{{ lastEditor.name || lastEditor.username || 'Guest' }}</div>
                                                        <div class="text-xs text-gray-500 dark:text-gray-400">@{{ lastEditor.username || 'guest' }}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <span>{{ lastEditor.name || lastEditor.username || '?' }} 編輯</span>
                                    </div>
                                    <!-- Last Edited Time -->
                                    <div v-if="relativeLastEditedTime" class="flex items-center">
                                        <i class="fa-solid fa-pen mr-1 text-gray-400"></i>
                                        <span>編輯於 {{ relativeLastEditedTime }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Markdown Content with inline TOC -->
                        <!-- Markdown Content with inline TOC logic adaptation -->
                        <div class="markdown-body dark:text-gray-300 flex justify-center" :class="{ 'has-toc': toc.length > 0 }">
                            <!-- Main content -->
                            <div class="w-full px-8 py-6 shrink-0" style="max-width: 900px" ref="previewContent"></div>
                        </div>
                    </div>
                    
                    <!-- TOC Sidebar (Fixed) - Matches note.html logic -->
                    <div v-if="toc.length > 0" class="fixed w-56 overflow-y-auto p-3 hidden lg:block note-toc">
                        <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3">
                            <i class="fa-solid fa-list mr-2"></i>目錄
                        </h3>
                        <nav class="space-y-1">
                            <a v-for="item in toc" 
                               :key="item.id" 
                               :href="'#' + item.id"
                               @click.prevent="scrollToHeading(item.id)"
                               class="block py-0.5 text-sm transition truncate border-l-2"
                               :class="{
                                    'pl-1': item.level === 1, 
                                    'pl-4': item.level === 2, 
                                    'pl-7': item.level === 3,
                                    'text-blue-600 dark:text-blue-400 border-blue-600 dark:border-blue-400 font-black': activeTocId === item.id,
                                    'text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 border-transparent': activeTocId !== item.id
                                }"
                                :title="item.text">
                                {{ item.text }}
                            </a>
                        </nav>
                    </div>
                </div>

                <!-- Reveal.js Container -->
                <div v-show="showPresentation" class="reveal absolute inset-0 z-50 bg-black">
                    <div class="slides"></div>
                    <button @click="togglePresentation" class="fixed top-4 right-4 z-[60] text-white/50 hover:text-white text-3xl transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </template>

            <!-- Image Lightbox -->
            <div v-if="lightboxImage" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 cursor-zoom-out" @click="closeLightbox">
                <img :src="lightboxImage" class="max-w-full max-h-full object-contain" @click.stop>
                <button @click="closeLightbox" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
    </script>

    <!-- Common scripts -->
    <script src="/js/common.js"></script>
    <script src="/js/note_share.js"></script>
</body>

</html>
