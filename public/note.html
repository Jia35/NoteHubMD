<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHubMD</title>

    <!-- TailwindCSS (compiled) -->
    <link rel="stylesheet" href="/css/tailwind.min.css">

    <!-- Vue & Vue Router -->
    <script src="/vendors/js/vue.global.prod.js"></script>
    <script src="/vendors/js/vue-router.global.prod.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendors/js/morphdom.min.js"></script>

    <!-- CodeMirror 5 (CSS bundled) -->
    <link rel="stylesheet" href="/vendors/css/codemirror.bundle.css">
    <script src="/vendors/js/codemirror/codemirror.min.js"></script>
    <script src="/vendors/js/codemirror/mode/markdown.min.js"></script>
    <script src="/vendors/js/codemirror/mode/xml.min.js"></script>
    <script src="/vendors/js/codemirror/mode/javascript.min.js"></script>
    <script src="/vendors/js/codemirror/mode/css.min.js"></script>
    <script src="/vendors/js/codemirror/mode/htmlmixed.min.js"></script>
    <script src="/vendors/js/codemirror/mode/clike.min.js"></script>
    <script src="/vendors/js/codemirror/mode/python.min.js"></script>
    <script src="/vendors/js/codemirror/mode/shell.min.js"></script>
    <script src="/vendors/js/codemirror/mode/sql.min.js"></script>
    <script src="/vendors/js/codemirror/mode/go.min.js"></script>
    <script src="/vendors/js/codemirror/mode/yaml.min.js"></script>
    <script src="/vendors/js/codemirror/mode/powershell.min.js"></script>
    <script src="/vendors/js/codemirror/mode/vbscript.min.js"></script>
    <script src="/vendors/js/codemirror/addon/placeholder.min.js"></script>
    <script src="/vendors/js/codemirror/addon/show-hint.min.js"></script>

    <!-- Markdown-it -->
    <script src="/vendors/js/markdown-it/markdown-it.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-container.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-anchor.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-imsize.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-mark.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-sup.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-emoji.min.js"></script>
    <script src="/vendors/js/markdown-it/markdown-it-task-lists.min.js"></script>
    <link rel="stylesheet" href="/vendors/css/github-markdown.min.css">

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="/vendors/css/highlight/github.min.css" id="hljs-light-theme">
    <link rel="stylesheet" href="/vendors/css/highlight/github-dark.min.css" id="hljs-dark-theme" disabled>
    <script src="/vendors/js/highlight.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/vendors/css/fontawesome/all.min.css">

    <!-- Mermaid -->
    <script src="/vendors/js/mermaid.min.js"></script>

    <!-- Day.js for date/time manipulation -->
    <script src="/vendors/js/dayjs/dayjs.min.js"></script>
    <script src="/vendors/js/dayjs/relativeTime.js"></script>
    <script src="/vendors/js/dayjs/zh-tw.js"></script>
    <script>
        dayjs.extend(dayjs_plugin_relativeTime);
        dayjs.locale('zh-tw');
    </script>

    <link rel="stylesheet" href="/css/style.css">

    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('NoteHubMD-theme') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body
    class="bg-gray-100 dark:bg-dark-bg h-screen overflow-hidden text-gray-900 dark:text-dark-text transition-colors duration-200">
    <div id="app" class="h-full flex flex-col">
        <router-view></router-view>

        <!-- Global Modal (replaces alert/confirm) -->
        <Teleport to="body">
            <Transition name="fade">
                <div v-if="$root.modal.show"
                    class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50" style="z-index: 200;"
                    @click.self="$root.modal.type === 'alert' ? $root.closeModal() : null">
                    <Transition name="modal-scale">
                        <div v-if="$root.modal.show"
                            class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
                            <!-- Header -->
                            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center"
                                :class="{
                                    'bg-blue-50 dark:bg-blue-900/20': $root.modal.type === 'info',
                                    'bg-green-50 dark:bg-green-900/20': $root.modal.type === 'success',
                                    'bg-yellow-50 dark:bg-yellow-900/20': $root.modal.type === 'warning',
                                    'bg-red-50 dark:bg-red-900/20': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                }">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3" :class="{
                                        'bg-blue-100 text-blue-600 dark:bg-blue-800 dark:text-blue-300': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'bg-green-100 text-green-600 dark:bg-green-800 dark:text-green-300': $root.modal.type === 'success',
                                        'bg-yellow-100 text-yellow-600 dark:bg-yellow-800 dark:text-yellow-300': $root.modal.type === 'warning',
                                        'bg-red-100 text-red-600 dark:bg-red-800 dark:text-red-300': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                    }">
                                    <i class="fa-solid text-lg" :class="{
                                        'fa-circle-info': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'fa-circle-check': $root.modal.type === 'success',
                                        'fa-triangle-exclamation': $root.modal.type === 'warning',
                                        'fa-circle-xmark': $root.modal.type === 'error',
                                        'fa-question-circle': $root.modal.type === 'confirm'
                                    }"></i>
                                </div>
                                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                                    {{ $root.modal.title || ($root.modal.type === 'confirm' ? '確認' : '提示') }}
                                </h3>
                            </div>
                            <!-- Body -->
                            <div class="px-6 py-4">
                                <p class="text-gray-700 dark:text-gray-300 whitespace-pre-wrap">{{ $root.modal.message
                                    }}</p>
                            </div>
                            <!-- Footer -->
                            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900 flex justify-end space-x-3">
                                <button v-if="$root.modal.type === 'confirm'" @click="$root.closeModal(false)"
                                    class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                                    {{ $root.modal.cancelText || '取消' }}
                                </button>
                                <button @click="$root.closeModal(true)"
                                    class="px-4 py-2 text-white rounded-lg transition" :class="{
                                        'bg-blue-600 hover:bg-blue-700': $root.modal.type === 'info' || $root.modal.type === 'alert',
                                        'bg-green-600 hover:bg-green-700': $root.modal.type === 'success',
                                        'bg-yellow-600 hover:bg-yellow-700': $root.modal.type === 'warning',
                                        'bg-red-600 hover:bg-red-700': $root.modal.type === 'error' || $root.modal.type === 'confirm'
                                    }">
                                    {{ $root.modal.confirmText || '確定' }}
                                </button>
                            </div>
                        </div>
                    </Transition>
                </div>
            </Transition>
        </Teleport>
    </div>

    <!-- Templates -->
    <script type="text/x-template" id="info-modal-template">
        <div v-if="show" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="$emit('close')">
            <div class="bg-white dark:bg-dark-surface rounded-lg shadow-xl w-full max-w-2xl mx-4 overflow-hidden flex flex-col" style="height: 70vh;">
                <!-- Modal Header -->
                <div class="flex justify-between items-center p-4 border-b border-gray-300 dark:border-gray-700 shrink-0">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white">
                        <i :class="type === 'book' ? 'fa-solid fa-book' : 'fa-solid fa-note-sticky'" class="mr-2"></i>
                        {{ type === 'book' ? '書本設定' : '筆記設定' }}
                    </h2>
                    <button @click="$emit('close')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <!-- Modal Body with Tabs -->
                <div class="flex flex-1 overflow-hidden">
                    <!-- Left Sidebar Tabs -->
                    <div class="w-40 border-r border-gray-300 dark:border-gray-700 shrink-0">
                        <button @click="$emit('update:tab', 'info')" 
                                :class="tab === 'info' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-info-circle mr-2"></i>{{ type === 'book' ? '書本資訊' : '筆記資訊' }}
                        </button>
                        <button @click="$emit('update:tab', 'permission')" 
                                :class="tab === 'permission' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-lock mr-2"></i>權限設定
                        </button>
                        <button v-if="type === 'note'" @click="$emit('update:tab', 'share')" 
                                :class="tab === 'share' ? 'text-blue-600 dark:text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                                class="w-full px-4 py-3 text-left text-sm font-medium transition flex items-center">
                            <i class="fa-solid fa-share-nodes mr-2"></i>分享筆記
                        </button>
                    </div>

                    <!-- Right Content Area -->
                    <div class="flex-1 overflow-y-auto">
                        <!-- Info Tab Content -->
                        <div v-show="tab === 'info'" class="p-4 space-y-4">
                            <!-- Title Section (at top) -->
                            <div>
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">
                                    <i :class="type === 'book' ? 'fa-solid fa-book' : 'fa-solid fa-note-sticky'" class="mr-1"></i> 標題
                                </label>
                                <!-- Editable title for books -->
                                <input v-if="type === 'book' && item.canEdit"
                                       :value="item.title || ''"
                                       @input="$emit('update:title', $event.target.value)"
                                       type="text"
                                       placeholder="輸入標題..."
                                       class="w-full px-3 py-2 text-sm font-bold border rounded bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <!-- Read-only title for notes or non-editable books -->
                                <div v-else class="px-3 py-2 text-sm font-bold text-gray-800 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded">
                                    {{ item.title || 'Untitled' }}
                                </div>
                            </div>

                            <!-- Item Info -->
                            <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded text-sm">
                                <div class="text-gray-500 dark:text-gray-400 mb-1">ID：<span class="font-mono text-gray-700 dark:text-gray-300">{{ item.id }}</span></div>
                                <div class="text-gray-500 dark:text-gray-400 mb-1">{{ type === 'book' ? '建立者' : '擁有者' }}：<span class="text-gray-700 dark:text-gray-300">{{ item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">建立時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.createdAt) }}</span></div>
                                <!-- Book: 最後更新者, 最後更新時間 -->
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新者：<span class="text-gray-700 dark:text-gray-300">{{ item.lastUpdater?.username || item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'book'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.updatedAt) }}</span></div>
                                <!-- Note: 最後編輯者, 最後編輯時間, 最後更新者, 最後更新時間 -->
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">最後編輯者：<span class="text-gray-700 dark:text-gray-300">{{ item.lastEditor?.username || item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">最後編輯時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.lastEditedAt) }}</span></div>
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新者：<span class="text-gray-700 dark:text-gray-300">{{ item.lastUpdater?.username || item.lastEditor?.username || item.owner?.username || '(未知)' }}</span></div>
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">最後更新時間：<span class="text-gray-700 dark:text-gray-300">{{ formatDate(item.updatedAt) }}</span></div>
                                <div v-if="type === 'note'" class="text-gray-500 dark:text-gray-400 mb-1">字元數：<span class="text-gray-700 dark:text-gray-300">{{ item.charCount ?? item.content?.length ?? 0 }}</span></div>
                                <div v-if="type === 'note' && item.lineCount !== undefined" class="text-gray-500 dark:text-gray-400">行數：<span class="text-gray-700 dark:text-gray-300">{{ item.lineCount }}</span></div>
                            </div>

                            <!-- Description Editor (for books only) -->
                            <div v-if="type === 'book'">
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">
                                    <i class="fa-solid fa-align-left mr-1"></i> 描述
                                </label>
                                <textarea v-if="item.canEdit"
                                          :value="editableDescription"
                                          @input="$emit('update:description', $event.target.value)"
                                          rows="3"
                                          placeholder="輸入描述..."
                                          class="w-full px-3 py-2 text-sm border rounded bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                                <p v-else class="text-gray-700 dark:text-gray-300 text-sm bg-gray-100 dark:bg-gray-700 p-2 rounded">{{ editableDescription || '無描述' }}</p>
                            </div>

                            <!-- Book Info (for notes) -->
                            <div v-if="type === 'note'" class="bg-gray-50 dark:bg-gray-800 p-3 rounded text-sm mb-2">
                                <div class="text-gray-500 dark:text-gray-400 mb-2 font-medium">
                                    <i class="fa-solid fa-book mr-1"></i>所屬書本
                                </div>
                                <div class="flex items-center gap-2">
                                     <select v-model="selectedMoveBookId" 
                                             class="flex-1 px-2 py-1.5 border rounded bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                         <option value="">(未分類筆記)</option>
                                         <option v-for="book in books" :key="book.id" :value="book.id">{{ book.title }}</option>
                                     </select>
                                     <button @click="moveNote" 
                                             class="px-3 py-1.5 border border-blue-500 text-blue-500 rounded hover:text-white hover:bg-blue-600 transition text-xs whitespace-nowrap">
                                         移動
                                     </button>
                                </div>
                                <div v-if="item.book" class="mt-2 text-xs text-gray-500 dark:text-gray-400">
                                     目前位置：
                                     <a :href="'/b/' + item.book.id" class="text-blue-500 hover:underline" @click="$emit('close')">
                                         {{ item.book.title }}
                                     </a>
                                </div>
                            </div>

                            <!-- Tags Section -->
                            <div v-if="editableTags !== undefined">
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">
                                    <i class="fa-solid fa-tags mr-1"></i> 標籤
                                </label>
                                <div class="flex flex-wrap gap-2 mb-2">
                                    <span v-for="tag in editableTags" :key="tag" 
                                          :class="type === 'book' ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' : 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300'"
                                          class="px-3 py-1 text-sm rounded-full flex items-center">
                                        {{ tag }}
                                        <button v-if="type === 'book' && item.canEdit" @click="$emit('remove-tag', tag)" class="ml-2 hover:text-red-500">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                    </span>
                                    <span v-if="editableTags.length === 0" class="text-gray-400 text-sm italic">無標籤</span>
                                </div>
                                <div v-if="type === 'book' && item.canEdit" class="flex gap-2">
                                    <input :value="newTagInput" 
                                           @input="$emit('update:newTag', $event.target.value)"
                                           @keyup.enter="$emit('add-tag')"
                                           type="text" 
                                           placeholder="輸入新標籤..." 
                                           class="flex-1 px-3 py-2 text-sm border rounded bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <button @click="$emit('add-tag')" class="px-3 py-2 text-sm bg-green-600 text-white rounded hover:bg-green-700 transition">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                                <p v-if="type === 'note'" class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                                    <i class="fa-solid fa-info-circle mr-1"></i>
                                    筆記標籤需在筆記內容中使用 <code class="bg-gray-200 dark:bg-gray-700 px-1 rounded">###### tags: `標籤名稱`</code> 語法進行編輯。
                                </p>
                            </div>

                            <!-- Comments Toggle (for notes, Owner only) -->
                            <div v-if="type === 'note' && item.isOwner" class="border-t border-gray-300 dark:border-gray-700 pt-4">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <i class="fa-solid fa-comments text-gray-500 mr-2"></i>
                                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">留言功能</span>
                                    </div>
                                    <label class="flex items-center cursor-pointer">
                                        <input type="checkbox" :checked="commentsEnabled" @change="$emit('update:commentsEnabled', $event.target.checked)" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                                        <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">{{ commentsEnabled ? '開啟' : '關閉' }}</span>
                                    </label>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                                    關閉後，此筆記將不顯示留言區域，現有留言也會被隱藏。
                                </p>
                            </div>
                        </div>

                        <!-- Permission Tab Content -->
                        <div v-show="tab === 'permission'" class="p-4">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">目前權限</label>
                                <select v-if="item.isOwner" 
                                        :value="editablePermission"
                                        @change="$emit('update:permission', $event.target.value)"
                                        class="w-full px-3 py-2 text-sm border rounded bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option v-if="type === 'note' && item.bookId" value="inherit">繼承書本權限</option>
                                    <option value="public-edit">可編輯</option>
                                    <option value="auth-edit">可編輯(需登入)</option>
                                    <option value="public-view">唯讀</option>
                                    <option value="auth-view">唯讀(需登入)</option>
                                    <option value="private">私人</option>
                                </select>
                                <div v-else class="text-gray-700 dark:text-gray-300 text-sm bg-gray-100 dark:bg-gray-700 p-2 rounded">
                                    {{ getPermissionLabel(item.permission) }}
                                </div>
                                <p v-if="editablePermission === 'inherit' && item.effectivePermission" class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                    實際權限：{{ getPermissionLabel(item.effectivePermission) }}
                                </p>
                                <p v-if="!item.isOwner" class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                                    <i class="fa-solid fa-info-circle mr-1"></i>
                                    只有擁有者可以變更權限設定。
                                </p>
                            </div>
                            
                            <template v-if="item.isOwner">
                                <div class="border-t border-gray-300 dark:border-gray-600 py-4">
                                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">
                                        <i class="fa-solid fa-user-plus mr-1"></i> 個別使用者權限
                                    </label>
                                    
                                    <div v-if="loadingUserPermissions" class="text-center py-2 text-gray-500 text-sm">
                                        <i class="fa-solid fa-spinner fa-spin mr-1"></i> 載入中...
                                    </div>
                                    
                                    <div v-if="userPermissions && userPermissions.length > 0" class="space-y-2 mb-3">
                                        <div v-for="perm in userPermissions" :key="perm.userId" 
                                             class="flex items-center justify-between bg-gray-100 dark:bg-gray-700 px-3 py-2 rounded-lg">
                                            <div class="flex items-center">
                                                <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-medium text-white mr-2 shrink-0 overflow-hidden bg-blue-600">
                                                    <img v-if="perm.user?.avatar" :src="perm.user.avatar" class="w-full h-full object-cover" alt="">
                                                    <template v-else>{{ perm.user?.username?.charAt(0).toUpperCase() || '?' }}</template>
                                                </span>
                                                <span class="text-sm text-gray-700 dark:text-gray-200">{{ perm.user?.name || perm.user?.username }}</span>
                                            </div>
                                            <div class="flex items-center space-x-2">
                                                <select :value="perm.permission" @change="$emit('update-user-permission', perm, $event.target.value)"
                                                        class="text-xs bg-white dark:bg-gray-600 border border-gray-300 dark:border-gray-500 rounded px-2 py-1">
                                                    <option value="view">可查看</option>
                                                    <option value="edit">可編輯</option>
                                                </select>
                                                <button @click="$emit('remove-user-permission', perm.userId)" 
                                                        class="text-red-500 hover:text-red-700 text-xs" title="移除">
                                                    <i class="fa-solid fa-times"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="relative">
                                        <div class="flex space-x-2">

                                        :class="{'border-red-500 dark:border-red-500': aliasError}">
                                    <button v-if="currentAlias" @click="copyAliasUrl" 
                                        class="px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition text-sm cursor-pointer"

                                        <i :class="aliasCopied ? 'fa-solid fa-check text-green-500' : 'fa-regular fa-copy'"></i>
                                    </button>

                                        <span v-else>儲存</span>
                                    </button>

                                    <i class="fa-solid fa-arrows-rotate"></i>
                                    重設分享連結
                                </button>
                            </div>
                        </div>
                    </template>

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>

                            <select v-model="selectedTheme" class="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-1 py-0.5 text-xs text-gray-700 dark:text-gray-200 focus:outline-none focus:border-blue-500">
                                <option v-for="theme in themes" :key="theme.value" :value="theme.value">
                                    {{ theme.label }}
                                </option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Resizable Divider (only show in Both mode) -->
                    <div v-if="showEditor && showPreview" 
                         class="w-0.5 bg-gray-300 hover:bg-blue-400 dark:bg-gray-700 dark:hover:bg-blue-500 cursor-col-resize shrink-0 transition-colors z-10"
                         @mousedown="startResize"
                         title="拖曳調整寬度"></div>
                    
                    <!-- Preview with TOC -->
                    <div v-show="showPreview" class="h-full flex min-w-0 flex-1">
                        <!-- Preview Content -->
                        <div class="h-full flex flex-col flex-1 overflow-auto bg-white dark:bg-dark-bg"
                            ref="previewContainer"
                            @scroll="handlePreviewScroll"
                            @click="handlePreviewClick">
                            <!-- Preview Info Bar -->
                            <div class="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 py-2 text-xs text-gray-500 dark:text-gray-400 shrink-0"
                                :class="{'flex justify-center': !showEditor}">
                                <div :class="{'w-full px-8': !showEditor, 'px-4': showEditor}" :style="!showEditor ? 'max-width: 800px' : ''">
                                    <div class="flex items-center space-x-4">
                                    <!-- Owner -->
                                    <div v-if="noteOwner" class="flex items-center">
                                        <div class="relative group mr-1.5">
                                            <span class="w-5 h-5 rounded-full flex items-center justify-center font-medium text-white shrink-0 overflow-hidden cursor-help"
                                                  style="font-size: 10px;"
                                                  :class="noteOwner.username && noteOwner.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                <img v-if="noteOwner.avatar" :src="noteOwner.avatar" class="w-full h-full object-cover" alt="">
                                                <template v-else>{{ noteOwner.username?.charAt(0).toUpperCase() || '?' }}</template>
                                            </span>
                                            <!-- Tooltip -->
                                            <div class="absolute top-full left-0 mt-2 hidden group-hover:block z-50 bg-white dark:bg-gray-800 rounded-lg shadow-xl p-4 border border-gray-200 dark:border-gray-600" style="min-width: 200px;">
                                                <div class="absolute -top-2 left-2 w-4 h-4 bg-white dark:bg-gray-800 border-t border-l border-gray-200 dark:border-gray-600 transform rotate-45"></div>
                                                <div class="flex items-center relative z-10">
                                                    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-3 overflow-hidden shrink-0 border-2 border-gray-100 dark:border-gray-600"
                                                         :class="noteOwner.username && noteOwner.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                         <img v-if="noteOwner.avatar" :src="noteOwner.avatar" class="w-full h-full object-cover">
                                                         <span v-else class="text-xl text-white font-bold">{{ noteOwner.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                    </div>
                                                    <div>
                                                        <div class="font-bold text-gray-900 dark:text-white text-base">{{ noteOwner.name || noteOwner.username || 'Guest' }}</div>
                                                        <div class="text-xs text-gray-500 dark:text-gray-400">@{{ noteOwner.username || 'guest' }}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <span>{{ noteOwner.name || noteOwner.username || '?' }} 擁有這篇筆記</span>
                                    </div>
                                    <!-- Last Editor -->
                                    <div v-if="lastEditor" class="flex items-center">
                                        <div class="relative group mr-1.5">
                                            <span class="w-5 h-5 rounded-full flex items-center justify-center font-medium text-white shrink-0 overflow-hidden cursor-help"
                                                  style="font-size: 10px;"
                                                  :class="lastEditor.username && lastEditor.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                <img v-if="lastEditor.avatar" :src="lastEditor.avatar" class="w-full h-full object-cover" alt="">
                                                <template v-else>{{ lastEditor.username?.charAt(0).toUpperCase() || '?' }}</template>
                                            </span>
                                            <!-- Tooltip -->
                                            <div class="absolute top-full left-0 mt-2 hidden group-hover:block z-50 bg-white dark:bg-gray-800 rounded-lg shadow-xl p-4 border border-gray-200 dark:border-gray-600" style="min-width: 200px;">
                                                <div class="absolute -top-2 left-2 w-4 h-4 bg-white dark:bg-gray-800 border-t border-l border-gray-200 dark:border-gray-600 transform rotate-45"></div>
                                                <div class="flex items-center relative z-10">
                                                    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-3 overflow-hidden shrink-0 border-2 border-gray-100 dark:border-gray-600"
                                                         :class="lastEditor.username && lastEditor.username !== 'Guest' ? 'bg-blue-600' : 'bg-gray-500'">
                                                         <img v-if="lastEditor.avatar" :src="lastEditor.avatar" class="w-full h-full object-cover">
                                                         <span v-else class="text-xl text-white font-bold">{{ lastEditor.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                    </div>
                                                    <div>
                                                        <div class="font-bold text-gray-900 dark:text-white text-base">{{ lastEditor.name || lastEditor.username || 'Guest' }}</div>
                                                        <div class="text-xs text-gray-500 dark:text-gray-400">@{{ lastEditor.username || 'guest' }}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <span>{{ lastEditor.name || lastEditor.username || '?' }} 編輯</span>
                                    </div>
                                    <!-- Last Content Edited Time -->
                                    <div v-if="relativeLastContentEditedTime" class="flex items-center">
                                        <i class="fa-solid fa-pen mr-1 text-gray-400"></i>
                                        <span>編輯於 {{ relativeLastContentEditedTime }}</span>
                                    </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Preview Content -->
                            <div class="markdown-body dark:text-gray-300"
                                :class="{'flex justify-center': !showEditor, 'has-toc': toc.length > 0 && mode === 'view' && !showEditor}">
                                <div :class="{'w-full px-8 pb-2': !showEditor, 'px-8 pb-2': showEditor}" :style="!showEditor ? 'max-width: 800px' : ''" ref="previewContent"></div>
                            </div>

                            <!-- Comments Section (hidden when commentsDisabled) -->
                            <div v-if="(mode === 'view' || mode === 'both') && noteCommentsEnabled" class="border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900"
                                :class="{'flex justify-center': !showEditor}">
                                <div :class="{'w-full px-8 py-6': !showEditor, 'px-8 py-6': showEditor}" :style="!showEditor ? 'max-width: 800px' : ''">
                                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">
                                        <i class="fa-solid fa-comments mr-2"></i>留言 ({{ comments.length }})
                                    </h3>
                                    
                                    <!-- Comment Form (only if logged in and comments enabled) -->
                                    <div v-if="currentUser && commentsEnabled" class="mb-6">
                                        <div class="flex items-start space-x-3">
                                            <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 overflow-hidden bg-blue-600 text-white text-sm">
                                                <img v-if="currentUser.avatar" :src="currentUser.avatar" class="w-full h-full object-cover" alt="">
                                                <span v-else>{{ currentUser.username?.charAt(0).toUpperCase() || '?' }}</span>
                                            </div>
                                            <div class="flex-1">
                                                <!-- Textarea for editing -->
                                                <textarea v-show="!commentPreviewMode" v-model="newComment" 
                                                    placeholder="寫下你的留言..."
                                                    ref="commentTextarea"
                                                    @focus="commentTextareaFocused = true"
                                                    @blur="handleCommentBlur"
                                                    @input="autoGrowCommentTextarea"
                                                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-all"
                                                    :rows="commentTextareaFocused || newComment.trim() ? 3 : 1"
                                                    :style="{ maxHeight: '192px', overflow: 'auto' }"></textarea>
                                                <!-- Preview area -->
                                                <div v-if="commentPreviewMode && newComment.trim()" 
                                                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 overflow-auto"
                                                    style="min-height: 76px; max-height: 192px;"
                                                    v-html="renderCommentMarkdown(newComment)"></div>
                                                <div v-if="commentPreviewMode && !newComment.trim()" 
                                                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-900 text-gray-400 dark:text-gray-500 italic"
                                                    style="min-height: 76px;">
                                                    沒有內容可預覽
                                                </div>
                                                <div class="flex justify-between items-center mt-1">
                                                    <div class="text-xs text-gray-400"><span v-show="commentTextareaFocused">支援 Markdown 語法</span></div>
                                                    <div class="flex gap-2">
                                                        <button @click="commentPreviewMode = !commentPreviewMode"
                                                            :class="commentPreviewMode ? 'bg-gray-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'"
                                                            class="px-3 py-1.5 text-sm rounded-lg hover:opacity-80 transition">
                                                            <i class="fa-solid fa-eye mr-1"></i>{{ commentPreviewMode ? '編輯' : '預覽' }}
                                                        </button>
                                                        <button @click="submitComment" 
                                                            :disabled="!newComment.trim() || submittingComment"
                                                            class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
                                                            <i v-if="submittingComment" class="fa-solid fa-spinner fa-spin mr-1"></i>
                                                            送出留言
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Login prompt -->
                                    <div v-else-if="!currentUser && commentsEnabled" class="mb-6 text-center py-4 bg-gray-100 dark:bg-gray-800 rounded-lg">
                                        <p class="text-gray-500 dark:text-gray-400">
                                            <i class="fa-solid fa-lock mr-1"></i>請先 <router-link :to="'/login?redirect=/n/' + noteId" class="text-blue-500 hover:underline">登入</router-link> 後才能留言
                                        </p>
                                    </div>

                                    <!-- Comments disabled notice -->
                                    <div v-else-if="!commentsEnabled && comments.length === 0" class="mb-6 text-center py-4">
                                        <p class="text-gray-400 dark:text-gray-500 text-sm">留言功能已關閉</p>
                                    </div>

                                    <!-- Comment List -->
                                    <div class="space-y-4">
                                        <!-- Recursive comment component for nested replies -->
                                        <template v-for="comment in topLevelComments" :key="comment.id">
                                            <!-- Main Comment -->
                                            <div class="p-4 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                                                <div class="flex items-start space-x-3">
                                                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 overflow-hidden text-white text-sm"
                                                        :class="comment.user ? 'bg-blue-600' : 'bg-gray-500'">
                                                        <img v-if="comment.user?.avatar" :src="comment.user.avatar" class="w-full h-full object-cover" alt="">
                                                        <span v-else>{{ comment.user?.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                    </div>
                                                    <div class="flex-1 min-w-0">
                                                        <div class="flex items-center justify-between mb-1">
                                                            <div class="flex items-center space-x-2">
                                                                <span class="font-medium text-gray-800 dark:text-white text-sm">
                                                                    {{ comment.user?.name || comment.user?.username || '匿名' }}
                                                                </span>
                                                                <span class="text-xs text-gray-400">{{ formatCommentTime(comment.createdAt) }}</span>
                                                            </div>
                                                            <!-- Dropdown Menu -->
                                                            <div v-if="canEditComment(comment) || canDeleteComment(comment)" class="relative">
                                                                <button @click="toggleCommentMenu(comment.id)" data-comment-menu class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1">
                                                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                                                </button>
                                                                <div v-if="openMenuId === comment.id" 
                                                                    class="comment-menu-dropdown absolute right-0 top-full mt-1 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 py-1 z-10" style="min-width: 100px;">
                                                                    <button v-if="canEditComment(comment)" @click="startEditComment(comment)" 
                                                                        class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center">
                                                                        <i class="fa-solid fa-pen mr-2"></i>編輯
                                                                    </button>
                                                                    <button v-if="canDeleteComment(comment)" @click="deleteComment(comment.id)" 
                                                                        class="w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center">
                                                                        <i class="fa-solid fa-trash mr-2"></i>刪除
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Edit Mode -->
                                                        <div v-if="editingCommentId === comment.id">
                                                            <textarea v-model="editCommentContent" 
                                                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-sm"
                                                                rows="2"></textarea>
                                                            <div class="flex justify-end space-x-2 mt-2">
                                                                <button @click="cancelEditComment" class="px-3 py-1 text-sm text-gray-500 hover:text-gray-700">取消</button>
                                                                <button @click="saveEditComment(comment.id)" 
                                                                    :disabled="!editCommentContent.trim()"
                                                                    class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 disabled:opacity-50">儲存</button>
                                                            </div>
                                                        </div>
                                                        <!-- Display Mode -->
                                                        <template v-else>
                                                            <p class="text-gray-700 dark:text-gray-300 text-sm" v-html="renderCommentMarkdown(comment.content)"></p>
                                                            <!-- Reply Button -->
                                                            <button v-if="currentUser && commentsEnabled" @click="startReply(comment)" 
                                                                class="mt-2 text-xs text-gray-400 hover:text-blue-500 transition">
                                                                <i class="fa-solid fa-reply mr-1"></i>回覆
                                                            </button>
                                                        </template>
                                                    </div>
                                                </div>
                                                
                                                <!-- Reply Form (for this comment) -->
                                                <div v-if="replyingToId === comment.id" class="mt-4 ml-11">
                                                    <textarea v-model="replyContent" 
                                                        :placeholder="'回覆 ' + (comment.user?.name || comment.user?.username || '匿名') + '...'"
                                                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-sm"
                                                        rows="2"></textarea>
                                                    <div class="flex justify-end space-x-2 mt-2">
                                                        <button @click="cancelReply" class="px-3 py-1 text-sm text-gray-500 hover:text-gray-700">取消</button>
                                                        <button @click="submitReply(comment.id)" 
                                                            :disabled="!replyContent.trim()"
                                                            class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 disabled:opacity-50">送出</button>
                                                    </div>
                                                </div>

                                                <!-- Nested Replies -->
                                                <div v-if="getReplies(comment.id).length > 0" class="mt-4 ml-8 space-y-3 border-l-2 border-gray-200 dark:border-gray-700 pl-4">
                                                    <div v-for="reply in getReplies(comment.id)" :key="reply.id" class="flex items-start space-x-3">
                                                        <div class="w-6 h-6 rounded-full flex items-center justify-center shrink-0 overflow-hidden text-white text-xs"
                                                            :class="reply.user ? 'bg-blue-600' : 'bg-gray-500'">
                                                            <img v-if="reply.user?.avatar" :src="reply.user.avatar" class="w-full h-full object-cover" alt="">
                                                            <span v-else>{{ reply.user?.username?.charAt(0).toUpperCase() || '?' }}</span>
                                                        </div>
                                                        <div class="flex-1 min-w-0">
                                                            <div class="flex items-center justify-between">
                                                                <div class="flex items-center space-x-2">
                                                                    <span class="font-medium text-gray-700 dark:text-gray-200 text-xs">{{ reply.user?.name || reply.user?.username || '匿名' }}</span>
                                                                    <span class="text-xs text-gray-400">{{ formatCommentTime(reply.createdAt) }}</span>
                                                                </div>
                                                                <!-- Reply Dropdown Menu -->
                                                                <div v-if="canEditComment(reply) || canDeleteComment(reply)" class="relative">
                                                                    <button @click="toggleCommentMenu(reply.id)" data-comment-menu class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1 text-xs">
                                                                        <i class="fa-solid fa-ellipsis-vertical"></i>
                                                                    </button>
                                                                    <div v-if="openMenuId === reply.id" 
                                                                        class="comment-menu-dropdown absolute right-0 top-full mt-1 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 py-1 z-10" style="min-width: 100px;">
                                                                        <button v-if="canEditComment(reply)" @click="startEditComment(reply)" 
                                                                            class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center">
                                                                            <i class="fa-solid fa-pen mr-2"></i>編輯
                                                                        </button>
                                                                        <button v-if="canDeleteComment(reply)" @click="deleteComment(reply.id)" 
                                                                            class="w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center">
                                                                            <i class="fa-solid fa-trash mr-2"></i>刪除
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <!-- Reply Edit Mode -->
                                                            <div v-if="editingCommentId === reply.id">
                                                                <textarea v-model="editCommentContent" 
                                                                    class="w-full px-2 py-1 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-xs"
                                                                    rows="2"></textarea>
                                                                <div class="flex justify-end space-x-2 mt-1">
                                                                    <button @click="cancelEditComment" class="px-2 py-1 text-xs text-gray-500 hover:text-gray-700">取消</button>
                                                                    <button @click="saveEditComment(reply.id)" 
                                                                        :disabled="!editCommentContent.trim()"
                                                                        class="px-2 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700 disabled:opacity-50">儲存</button>
                                                                </div>
                                                            </div>
                                                            <p v-else class="text-gray-600 dark:text-gray-400 text-xs" v-html="renderCommentMarkdown(reply.content)"></p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>

                                        <div v-if="comments.length === 0 && commentsEnabled" class="text-center py-8 text-gray-400 dark:text-gray-500">
                                            <i class="fa-regular fa-comment-dots text-3xl mb-2"></i>
                                            <p>還沒有人留言，成為第一個留言的人吧！</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- TOC Sidebar (only in view mode) - positioned relative to content -->
                        <div v-if="toc.length > 0 && mode === 'view' && !showEditor" 
                            class="fixed w-56 overflow-y-auto p-3 hidden lg:block note-toc">
                            <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3">
                                <i class="fa-solid fa-list mr-2"></i>目錄
                            </h3>
                            <nav class="space-y-1">
                                <a v-for="item in toc" :key="item.id" 
                                @click.prevent="scrollToHeading(item.id)"
                                class="block py-0.5 text-sm cursor-pointer truncate transition border-l-2"
                                :class="{
                                    'pl-1': item.level === 1, 
                                    'pl-4': item.level === 2, 
                                    'pl-7': item.level === 3,
                                    'text-blue-600 dark:text-blue-400 border-blue-600 dark:border-blue-400 font-black': activeTocId === item.id,
                                    'text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 border-transparent': activeTocId !== item.id
                                }"
                                :title="item.text">
                                    {{ item.text }}
                                </a>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image Lightbox Modal -->
        <Transition name="fade">
            <div v-if="lightboxImage" 
                 class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-90 cursor-zoom-out"
                 style="z-index: 100;"
                 @click="closeLightbox">
                <!-- Close button -->
                <button @click="closeLightbox" 
                        class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center text-white text-2xl hover:bg-white hover:bg-opacity-20 rounded-full transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <!-- Image -->
                <img :src="lightboxImage" 
                     class="object-contain cursor-default shadow-2xl"
                     style="max-width: 90vw; max-height: 90vh;"
                     @click.stop />
            </div>
        </Transition>
    </script>

    <script src="/js/common.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/note.js"></script>
</body>

</html>
